<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:cursive;
}

body{
overflow:hidden;
height:100vh;
position:relative;

background:
linear-gradient(
135deg,
#ffe9f5,
#fff6d7,
#e0f8ff,
#f0e2ff
);

animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(18deg);}
}

.bg{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.float{
position:absolute;
transform:translate(-50%,-50%);
}

@keyframes aurora{

0%{
transform:
translate(-50%,-50%)
scale(.2)
rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:
translate(-50%,-50%)
scale(1.8)
rotate(360deg);
opacity:0;
}

}

.chat{

position:absolute;

top:15%;

width:100%;

text-align:center;

font-size:38px;

font-style:italic;

font-weight:bold;

color:black;

text-shadow:
0 0 25px #ff5db8;

z-index:50;

}

#cake{

position:absolute;

left:50%;

bottom:20px;

transform:translateX(-50%);

display:flex;

flex-direction:column;

align-items:center;

z-index:80;

}

.layer{

width:320px;

height:40px;

background:#d6aaaa;

margin-top:3px;

border-radius:12px;

}

.cream{

width:350px;

height:50px;

background:white;

margin-bottom:-12px;

border-radius:25px;

}

.candle{

width:15px;

height:90px;

background:white;

border-radius:20px;

position:relative;

}

.flame{

position:absolute;

top:-24px;

left:-5px;

width:24px;

height:34px;

background:gold;

border-radius:50%;

box-shadow:
0 0 70px yellow;

animation:fire .6s infinite;

}

@keyframes fire{

50%{
transform:scale(1.2);
}

}

.frame{

position:absolute;

width:100%;

height:100%;

display:none;

overflow:hidden;

z-index:20;

}

</style>

</head>

<body>

<div class="bg" id="bg"></div>

<div class="frame" id="frame"></div>

<div id="chat" class="chat"></div>

<div id="cake"></div>

<script>

const bg=document.getElementById("bg")
const frame=document.getElementById("frame")
const chat=document.getElementById("chat")
const cake=document.getElementById("cake")

function wait(t){
return new Promise(r=>setTimeout(r,t))
}

function createBackground(){

setInterval(()=>{

let x=document.createElement("div")

x.className="float"

x.style.left=
Math.random()*100+"%"

x.style.top=
Math.random()*100+"%"

let size=
150+
Math.random()*300

x.style.width=
size+"px"

x.style.height=
size+"px"

x.style.borderRadius=
"50%"

x.style.background=
`
conic-gradient(
from ${Math.random()*360}deg,
rgba(255,120,210,.35),
rgba(255,220,120,.25),
rgba(120,220,255,.35),
rgba(180,140,255,.35),
rgba(255,120,210,.35)
)
`

x.style.filter=
`
blur(
${40+Math.random()*30}px
)
`

x.style.animation=
`
aurora
12s
linear
forwards
`

bg.appendChild(x)

setTimeout(()=>{
x.remove()
},12000)

},350)

}

createBackground()

async function type(msg){

chat.innerHTML=""

for(let i=0;i<msg.length;i++){

chat.innerHTML+=msg[i]

await wait(70)

}

}

function buildCake(){

cake.innerHTML=
`
<div class="candle">
<div class="flame"></div>
</div>

<div class="cream"></div>
`

for(let i=0;i<3;i++){

setTimeout(()=>{

let l=
document.createElement("div")

l.className="layer"

cake.appendChild(l)

},
i*700)

}

}

function birthdayScene(){

cake.innerHTML=""
chat.innerHTML=""

bg.style.display="none"

frame.style.display="block"

frame.innerHTML=

`

<video
id="sea"
autoplay
muted
loop>

<source
src="https://media.istockphoto.com/id/1194337503/video/aerial-view-of-clear-turquoise-sea-and-waves.mp4">

</video>

<video
id="pigeon"
autoplay
muted
loop>

<source
src="https://cdn.pixabay.com/video/2023/10/12/189356-873774731_large.mp4">

</video>

<div id="msg">


<br>

HAPPY BIRTHDAY

<br>

PAVAN

🎂

</div>

`

let s=document.createElement("style")

s.innerHTML=`

#sea{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#msg{

position:absolute;

top:50%;

left:50%;

transform:
translate(
-50%,
-50%
);

font-size:70px;

color:white;

text-align:center;

text-shadow:
0 0 40px white;

z-index:5;

}

#pigeon{

position:absolute;

left:-250px;

bottom:50px;

width:200px;

animation:
fly 8s linear;

}

@keyframes fly{

0%{
left:-250px;
}

100%{
left:110%;
}

}

`

document.head.appendChild(s)

}

async function start(){

await type(
"✨ Happy Birthday Surprise Loading..."
)

await wait(1500)

buildCake()

await wait(5000)

birthdayScene()

}

window.onload=start

</script>

</body>

</html>
```
